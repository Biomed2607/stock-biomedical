<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock — Stock Biomédical</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Stock</h1>
      <p>Entrées, sorties et alertes de consommables</p>
    </div>

    <nav>
      <a href="index.html">Accueil</a>
      <a href="stock.html">Stock</a>
      <a href="gestion-stock.html">Gestion du stock</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Ajouter ou retirer un consommable</h2>

      <form id="movementForm" class="form-grid">
        <label>
          Consommable
          <select id="itemSelect" required>
            <option value="">Chargement...</option>
          </select>
        </label>

        <label>
          Mouvement
          <select id="movementType" required>
            <option value="in">Entrée de stock</option>
            <option value="out">Sortie de stock</option>
          </select>
        </label>

        <label>
          Quantité
          <input id="movementQty" type="number" min="1" required />
        </label>

        <div class="form-actions">
          <button class="btn primary" type="submit">Valider le mouvement</button>
        </div>
      </form>

      <p id="movementMessage" class="message"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Alertes stock bas</h2>
        <button id="prepareAlertsBtn" class="btn warning" type="button">
          Préparer email fournisseur
        </button>
      </div>

      <div id="alertsList">
        <p>Chargement des alertes...</p>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>État du stock</h2>
        <button id="exportBtn" class="btn secondary" type="button">
          Exporter CSV
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Référence</th>
              <th>Désignation</th>
              <th>Quantité</th>
              <th>Seuil</th>
              <th>Fournisseur</th>
              <th>Email</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="stockTable">
            <tr>
              <td colspan="7">Chargement du stock...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

 <script type="module" src="index.js"></script>
</body>
</html>
