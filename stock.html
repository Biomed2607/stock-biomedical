<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock — Stock Biomédical</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Scan QR code avec caméra -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Stock</h1>
      <p>Gestion des entrées, sorties, seuils et ruptures de stock</p>
    </div>

    <nav>
      <a href="index.html">Accueil</a>
      <a href="stock.html">Stock</a>
      <a href="gestion-stock.html">Gestion du stock</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Scanner un QR code</h2>

      <div class="form-grid">
        <label>
          Saisir ou scanner le QR code
          <input id="qrSearch" type="text" placeholder="Scanner ou saisir le QR code" />
        </label>

        <div class="form-actions">
          <button id="searchQrBtn" class="btn secondary" type="button">Rechercher</button>
          <button id="startScannerBtn" class="btn primary" type="button">Ouvrir la caméra</button>
          <button id="stopScannerBtn" class="btn danger" type="button">Fermer la caméra</button>
        </div>
      </div>

      <div id="qrReader" class="qr-reader"></div>
      <p id="scanMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>Gérer le stock</h2>

      <form id="movementForm" class="form-grid">
        <label>
          Consommable
          <select id="itemSelect" required>
            <option value="">Chargement...</option>
          </select>
        </label>

        <label>
          Quantité actuelle
          <input id="currentQty" type="number" value="0" readonly />
        </label>

        <label>
          Seuil d’alerte
          <input id="stockThreshold" type="number" min="0" value="0" required />
        </label>

        <label>
          Mouvement
          <select id="movementType" required>
            <option value="in">Entrée de stock</option>
            <option value="out">Sortie de stock</option>
          </select>
        </label>

        <label>
          Quantité à ajouter ou retirer
          <input id="movementQty" type="number" min="1" required />
        </label>

        <label class="full">
          Commentaire
          <textarea id="movementComment" rows="2" placeholder="Commentaire facultatif"></textarea>
        </label>

        <div class="form-actions full">
          <button class="btn primary" type="submit">Valider le mouvement</button>
        </div>
      </form>

      <p id="selectedItemInfo" class="message"></p>
      <p id="movementMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>État du stock</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Référence</th>
              <th>Désignation</th>
              <th>Emplacement</th>
              <th>Quantité</th>
              <th>Seuil</th>
              <th>Fournisseur</th>
              <th>Email</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="stockTable">
            <tr>
              <td colspan="8">Chargement du stock...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
