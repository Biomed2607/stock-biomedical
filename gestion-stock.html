<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion du stock — Stock Biomédical</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Génération QR code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Gestion du stock</h1>
      <p>Création et modification des fiches consommables</p>
    </div>

    <nav>
      <a href="index.html">Accueil</a>
      <a href="stock.html">Stock</a>
      <a href="gestion-stock.html">Gestion du stock</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2 id="formTitle">Ajouter un consommable</h2>

      <form id="itemForm" class="form-grid">
        <input type="hidden" id="itemId" />
        <input type="hidden" id="itemInternalCode" />
        <input type="hidden" id="itemQrValue" />

        <label>
          Référence
          <input id="reference" type="text" placeholder="Ex : GANT-NIT-M" required />
        </label>

        <label>
          Désignation
          <input id="designation" type="text" placeholder="Ex : Gants nitrile stériles" required />
        </label>

        <label>
          Catégorie
          <select id="category" required>
            <option value="Consommable">Consommable</option>
            <option value="piece_detachee">Pièce détachée</option>
            <option value="autre">Autre</option>
          </select>
        </label>

        <label>
          Prix unitaire
          <input id="price" type="number" min="0" step="0.01" value="0" required />
        </label>

        <label>
          Emplacement
          <input id="storageLocation" type="text" placeholder="Ex : R1 - Étagère 1" required />
        </label>

        <label>
          Fournisseur
          <input id="supplier" type="text" placeholder="Ex : Medline" required />
        </label>

        <label>
          Contact fournisseur
          <input id="contact" type="text" placeholder="Ex : Service commercial" />
        </label>

        <label>
          Email fournisseur
          <input id="email" type="email" placeholder="fournisseur@example.com" required />
        </label>

        <label class="full">
          Notes
          <textarea id="notes" rows="3" placeholder="Informations complémentaires"></textarea>
        </label>

        <div class="form-actions full">
          <button class="btn primary" type="submit">Enregistrer le consommable</button>
          <button id="resetBtn" class="btn secondary" type="button">Réinitialiser</button>
        </div>
      </form>

      <p id="formMessage" class="message"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Liste des consommables</h2>
        <input id="searchInput" class="search" type="search" placeholder="Rechercher..." />
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Référence</th>
              <th>Désignation</th>
              <th>Catégorie</th>
              <th>Emplacement</th>
              <th>Fournisseur</th>
              <th>Email</th>
              <th>Prix</th>
              <th>QR code</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="itemsTable">
            <tr>
              <td colspan="9">Chargement des consommables...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
